<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 110">
  <!-- ManProjects Ltd Logo -->

  <!-- Swoosh mark - two overlapping angular shapes -->
  <g transform="translate(50, 53)">
    <!-- Grey swoosh (behind, going left-to-upper-right) -->
    <path d="M-30,5 L-5,-45 L10,-10 L-15,5 Z" fill="#9A9A9A" opacity="0.75"/>
    <path d="M-30,5 L-5,45 L-15,5 Z" fill="#B0B0B0" opacity="0.6"/>

    <!-- Maroon swoosh (front, going right-to-upper-left) -->
    <path d="M30,5 L5,-45 L-10,-10 L15,5 Z" fill="#8B1A1A" opacity="0.85"/>
    <path d="M30,5 L5,45 L15,5 Z" fill="#A02020" opacity="0.65"/>

    <!-- Subtle center vertical -->
    <line x1="0" y1="-47" x2="0" y2="47" stroke="#999" stroke-width="0.8" opacity="0.25"/>
  </g>

  <!-- Company name -->
  <text x="90" y="58" font-family="'Trebuchet MS','Segoe UI',Arial,sans-serif" font-size="36" font-weight="700" fill="#4A4A4A" letter-spacing="-0.5">Man</text>
  <text x="155" y="58" font-family="'Trebuchet MS','Segoe UI',Arial,sans-serif" font-size="36" font-weight="700" fill="#4A4A4A" letter-spacing="-0.5">Projects</text>
  <text x="330" y="58" font-family="'Trebuchet MS','Segoe UI',Arial,sans-serif" font-size="24" font-weight="400" fill="#9A9A9A">Ltd</text>

  <!-- Tagline -->
  <text x="92" y="80" font-family="'Trebuchet MS','Segoe UI',Arial,sans-serif" font-size="11.5" fill="#9A9A9A" letter-spacing="0.5">Electrical and Mechanical Building Services</text>
</svg>