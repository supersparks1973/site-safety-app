<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ManProjects — O&M Manager</title>

<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #8B1A1A;
  --primary-light: #B22222;
  --primary-dark: #1e293b;
  --accent: #f59e0b;
  --accent-hover: #d97706;
  --success: #10b981;
  --danger: #ef4444;
  --warning: #f59e0b;
  --bg: #f1f5f9;
  --card: #ffffff;
  --border: #e2e8f0;
  --text: #1e293b;
  --text-light: #64748b;
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -2px rgba(0,0,0,.05);
}
html { font-size: 15px; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── Layout ── */
.app { display: flex; min-height: 100vh; }
.sidebar { width: 260px; background: var(--primary-dark); color: #fff; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; transition: transform .3s; }
.sidebar.collapsed { transform: translateX(-260px); }
.main { flex: 1; margin-left: 260px; transition: margin-left .3s; }
.sidebar.collapsed + .main { margin-left: 0; }

/* ── Sidebar ── */
.sidebar-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,.1); }
.sidebar-header h1 { font-size: 1.2rem; font-weight: 700; }
.sidebar-header p { font-size: .75rem; color: rgba(255,255,255,.6); margin-top: 4px; }
.sidebar-nav { flex: 1; overflow-y: auto; padding: 12px 0; }
.nav-section { padding: 8px 20px; font-size: .65rem; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,.4); margin-top: 8px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; cursor: pointer; transition: background .15s; font-size: .9rem; color: rgba(255,255,255,.8); }
.nav-item:hover { background: rgba(255,255,255,.08); }
.nav-item.active { background: rgba(255,255,255,.12); color: #fff; border-left: 3px solid var(--accent); }
.nav-item .icon { width: 20px; text-align: center; font-size: 1rem; }
.nav-item .badge { margin-left: auto; background: var(--accent); color: var(--primary-dark); font-size: .7rem; padding: 2px 7px; border-radius: 10px; font-weight: 600; }

/* ── Top Bar ── */
.topbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 50; }
.topbar .menu-btn { background: none; border: none; font-size: 1.3rem; cursor: pointer; display: none; color: var(--text); }
.topbar .breadcrumb { font-size: .85rem; color: var(--text-light); }
.topbar .breadcrumb span { color: var(--text); font-weight: 600; }
.topbar .spacer { flex: 1; }
.topbar .user-info { font-size: .85rem; color: var(--text-light); }

/* ── Content ── */
.content { padding: 24px; max-width: 1400px; }

/* ── Cards ── */
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
.card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-header h2 { font-size: 1rem; font-weight: 600; }
.card-body { padding: 20px; }

/* ── Buttons ── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border: none; border-radius: var(--radius); font-size: .85rem; font-weight: 500; cursor: pointer; transition: all .15s; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-light); }
.btn-accent { background: var(--accent); color: var(--primary-dark); }
.btn-accent:hover { background: var(--accent-hover); }
.btn-success { background: var(--success); color: #fff; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { background: var(--bg); }
.btn-sm { padding: 5px 10px; font-size: .8rem; }
.btn-lg { padding: 12px 24px; font-size: 1rem; }

/* ── Grid ── */
.grid { display: grid; gap: 20px; }
.grid-2 { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
.grid-3 { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
.grid-4 { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }

/* ── Stats ── */
.stat-card { padding: 20px; display: flex; align-items: center; gap: 16px; }
.stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
.stat-icon.blue { background: #dbeafe; color: #2563eb; }
.stat-icon.green { background: #d1fae5; color: #059669; }
.stat-icon.amber { background: #fef3c7; color: #d97706; }
.stat-icon.red { background: #fee2e2; color: #dc2626; }
.stat-info h3 { font-size: 1.5rem; font-weight: 700; }
.stat-info p { font-size: .8rem; color: var(--text-light); }

/* ── Progress Bar ── */
.progress-bar { height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 4px; transition: width .4s ease; }
.progress-fill.green { background: var(--success); }
.progress-fill.amber { background: var(--warning); }
.progress-fill.red { background: var(--danger); }
.progress-fill.blue { background: #3b82f6; }

/* ── Table ── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: .85rem; }
th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); }
th { font-weight: 600; color: var(--text-light); font-size: .75rem; text-transform: uppercase; letter-spacing: .5px; background: #f8fafc; }
tr:hover td { background: #f8fafc; }

/* ── Status badges ── */
.status { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 12px; font-size: .75rem; font-weight: 500; }
.status.complete { background: #d1fae5; color: #065f46; }
.status.in-progress { background: #dbeafe; color: #1e40af; }
.status.pending { background: #fef3c7; color: #92400e; }
.status.overdue { background: #fee2e2; color: #991b1b; }

/* ── Modal ── */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity .2s; }
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal { background: var(--card); border-radius: 12px; box-shadow: var(--shadow-lg); width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
.modal-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-header h2 { font-size: 1.1rem; }
.modal-close { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--text-light); }
.modal-body { padding: 20px; }
.modal-footer { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

/* ── Forms ── */
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: .85rem; font-weight: 500; margin-bottom: 6px; color: var(--text); }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius);
  font-size: .9rem; font-family: inherit; transition: border-color .15s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none; border-color: var(--primary-light); box-shadow: 0 0 0 3px rgba(139,26,26,.1);
}
.form-row { display: flex; gap: 16px; }
.form-row .form-group { flex: 1; }

/* ── Upload zone ── */
.upload-zone { border: 2px dashed var(--border); border-radius: var(--radius); padding: 32px; text-align: center; cursor: pointer; transition: all .2s; background: #f8fafc; }
.upload-zone:hover, .upload-zone.dragover { border-color: var(--primary-light); background: #eff6ff; }
.upload-zone .icon { font-size: 2.5rem; color: var(--text-light); margin-bottom: 8px; }
.upload-zone p { color: var(--text-light); font-size: .85rem; }
.upload-zone .browse { color: var(--primary-light); font-weight: 600; text-decoration: underline; }

/* ── File list ── */
.file-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; background: #fff; }
.file-item .file-icon { font-size: 1.5rem; }
.file-item .file-info { flex: 1; }
.file-item .file-name { font-size: .85rem; font-weight: 500; }
.file-item .file-meta { font-size: .75rem; color: var(--text-light); }
.file-item .file-actions { display: flex; gap: 4px; }
.file-item .file-actions button { background: none; border: none; cursor: pointer; padding: 4px 6px; border-radius: 4px; font-size: .9rem; }
.file-item .file-actions button:hover { background: var(--bg); }

/* ── Tabs ── */
.tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 20px; gap: 0; overflow-x: auto; }
.tab { padding: 10px 18px; cursor: pointer; font-size: .85rem; font-weight: 500; color: var(--text-light); border-bottom: 2px solid transparent; margin-bottom: -2px; white-space: nowrap; transition: all .15s; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }

/* ── Section panels ── */
.section-panel { display: none; }
.section-panel.active { display: block; }

/* ── Project card ── */
.project-card { cursor: pointer; transition: box-shadow .2s, transform .15s; }
.project-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
.project-card .card-body { padding: 16px 20px; }
.project-card .project-title { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
.project-card .project-client { font-size: .8rem; color: var(--text-light); margin-bottom: 12px; }
.project-card .project-ref { font-size: .75rem; color: var(--text-light); }
.project-card .progress-info { display: flex; justify-content: space-between; font-size: .8rem; margin-bottom: 6px; }

/* ── Section checklist ── */
.checklist-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; cursor: pointer; transition: all .15s; }
.checklist-item:hover { border-color: var(--primary-light); background: #f8fafc; }
.checklist-item .check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: .8rem; flex-shrink: 0; }
.checklist-item.done .check { background: var(--success); border-color: var(--success); color: #fff; }
.checklist-item .info { flex: 1; }
.checklist-item .info h4 { font-size: .9rem; font-weight: 500; }
.checklist-item .info p { font-size: .75rem; color: var(--text-light); margin-top: 2px; }
.checklist-item .count { font-size: .8rem; color: var(--text-light); background: var(--bg); padding: 3px 10px; border-radius: 12px; }

/* ── Empty state ── */
.empty-state { text-align: center; padding: 48px 24px; color: var(--text-light); }
.empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
.empty-state h3 { font-size: 1.1rem; color: var(--text); margin-bottom: 6px; }
.empty-state p { font-size: .85rem; margin-bottom: 16px; }

/* ── Toast ── */
.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 12px 20px; border-radius: var(--radius); color: #fff; font-size: .85rem; box-shadow: var(--shadow-lg); animation: slideIn .3s; }
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }
.toast.info { background: var(--primary); }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ── Responsive ── */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-260px); }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .topbar .menu-btn { display: block; }
  .form-row { flex-direction: column; gap: 0; }
  .grid-3, .grid-4 { grid-template-columns: 1fr; }
}

/* ── Print ── */
@media print {
  .sidebar, .topbar, .btn, .upload-zone, .file-actions, .modal-overlay, .toast-container { display: none !important; }
  .main { margin-left: 0; }
  .card { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
}

/* ── Search bar ── */
.search-bar { position: relative; }
.search-bar input { padding-left: 36px; }
.search-bar .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-light); }

/* ── Export panel ── */
.export-options { display: flex; gap: 12px; flex-wrap: wrap; }
.export-option { flex: 1; min-width: 150px; padding: 20px; border: 2px solid var(--border); border-radius: var(--radius); text-align: center; cursor: pointer; transition: all .2s; }
.export-option:hover { border-color: var(--primary-light); background: #eff6ff; }
.export-option .icon { font-size: 2rem; margin-bottom: 8px; }
.export-option h4 { font-size: .9rem; margin-bottom: 4px; }
.export-option p { font-size: .75rem; color: var(--text-light); }

/* ── Notes ── */
.note-item { padding: 12px; border-left: 3px solid var(--primary-light); background: #f8fafc; margin-bottom: 8px; border-radius: 0 var(--radius) var(--radius) 0; }
.note-item .note-date { font-size: .7rem; color: var(--text-light); margin-bottom: 4px; }
.note-item .note-text { font-size: .85rem; }
</style>
</head>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>📋 O&M Manager</h1>
      <p>Operation & Maintenance Manuals</p>
    </div>

      <div class="nav-section">Main</div>

      </div>
      <div class="nav-item" data-page="maintenance" onclick="navigateTo('maintenance')">
        <span class="icon">🔧</span> Maintenance Schedules
      </div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">

      <h2 id="modalTitle">Modal</h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>

    <div class="modal-footer" id="modalFooter"></div>
  </div>

<!-- Toasts -->
<div class="toast-container" id="toasts"></div>

<script>
// ════════════════════════════════════════════════════
//  DATA LAYER — all state stored in-memory + localStorage
// ════════════════════════════════════════════════════

const STORAGE_KEY = 'om_manager_data';
const DEFAULT_SECTIONS = [
  { id: 'project_info', name: 'Project Information', description: 'General project details, scope, and introduction', required: true },
  { id: 'data_sheets', name: 'Data Sheets', description: 'Equipment and product data sheets from manufacturers', required: true },
  { id: 'drawings', name: 'Drawings', description: 'As-built drawings, schematics, layouts, and diagrams', required: true },
  { id: 'test_certs', name: 'Test Certificates', description: 'Commissioning test results and completion certificates', required: true },
  { id: 'calibration_certs', name: 'Calibration Certificates', description: 'Instrument calibration records and certificates', required: true },
  { id: 'warranties', name: 'Warranties & Guarantees', description: 'Warranty documents, guarantee certificates, and terms', required: true },
  { id: 'spare_parts', name: 'Spare Parts Lists', description: 'Recommended spare parts and reorder information', required: false },
  { id: 'maintenance_schedules', name: 'Maintenance Schedules', description: 'Planned preventive maintenance routines and frequencies', required: true },
  { id: 'operating_procedures', name: 'Operating Procedures', description: 'Start-up, shutdown, and operating instructions for each system', required: true },
  { id: 'emergency_procedures', name: 'Emergency Procedures', description: 'Emergency shutdown, isolation, and response procedures', required: true },
  { id: 'health_safety', name: 'Health & Safety', description: 'COSHH data, risk assessments, method statements, and safety information', required: true },
  { id: 'commissioning', name: 'Commissioning Records', description: 'Commissioning checklists, witness records, and sign-off documents', required: false },
  { id: 'bms_controls', name: 'BMS / Controls', description: 'Building Management System documentation, points schedules, control strategies', required: false },
  { id: 'as_installed', name: 'As-Installed Records', description: 'Records of installed equipment, serial numbers, and locations', required: false },
  { id: 'training_records', name: 'Training Records', description: 'Evidence of operator/user training and competency records', required: false },
  { id: 'handover_certs', name: 'Handover Certificates', description: 'Practical completion, sectional completion, and handover documentation', required: false },
];

let state = loadState();

function defaultState() {
  return { projects: [], currentProjectId: null };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return defaultState();
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function currentProject() {
  return state.projects.find(p => p.id === state.currentProjectId) || null;
}

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function createProject(data) {
  const project = {
    id: genId(),
    name: data.name,
    client: data.client || '',
    reference: data.reference || '',
    address: data.address || '',
    contractor: data.contractor || '',
    startDate: data.startDate || '',
    handoverDate: data.handoverDate || '',
    description: data.description || '',
    createdAt: new Date().toISOString(),
    sections: DEFAULT_SECTIONS.map(s => ({ ...s, documents: [] })),
    equipment: [],
    contacts: [],
    maintenanceItems: [],
    notes: [],
  };
  state.projects.push(project);
  state.currentProjectId = project.id;
  saveState();
  return project;
}

function deleteProject(id) {
  state.projects = state.projects.filter(p => p.id !== id);
  if (state.currentProjectId === id) state.currentProjectId = state.projects[0]?.id || null;
  saveState();
}

function getProjectProgress(project) {
  if (!project) return 0;
  const required = project.sections.filter(s => s.required);
  if (required.length === 0) return 100;
  const done = required.filter(s => s.documents.length > 0).length;
  return Math.round((done / required.length) * 100);
}

function getTotalDocs(project) {
  if (!project) return 0;
  return project.sections.reduce((sum, s) => sum + s.documents.length, 0);
}

// ════════════════════════════════════════════════════
//  UI HELPERS
// ════════════════════════════════════════════════════

function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function openModal(title, bodyHtml, footerHtml) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modalFooter').innerHTML = footerHtml || '';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

function formatDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
}

function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1048576).toFixed(1) + ' MB';
}

function fileIcon(name) {
  const ext = (name || '').split('.').pop().toLowerCase();
  const map = { pdf: '📕', doc: '📘', docx: '📘', xls: '📗', xlsx: '📗', dwg: '📐', dxf: '📐', jpg: '🖼️', jpeg: '🖼️', png: '🖼️', zip: '📦', rar: '📦' };
  return map[ext] || '📄';
}

function openSectionTab(sectionId) {
  const p = currentProject();
  if (!p) return;
  document.querySelectorAll('#docTabs .tab').forEach(t => t.classList.toggle('active', t.dataset.section === sectionId));
  const section = p.sections.find(s => s.id === sectionId);
  if (!section) return;

  const sc = document.getElementById('sectionContent');
  sc.innerHTML = `
    <div class="card">
      <div class="card-header">
        <div>
          <h2>${esc(section.name)}</h2>
          <p style="font-size:.8rem;color:var(--text-light);margin-top:2px">${esc(section.description)}</p>
        </div>
        ${section.required ? '<span class="status overdue">REQUIRED</span>' : '<span class="status in-progress">OPTIONAL</span>'}
      </div>
      <div class="card-body">
        <div class="upload-zone" id="uploadZone_${sectionId}"
          ondragover="event.preventDefault();this.classList.add('dragover')"
          ondragleave="this.classList.remove('dragover')"
          ondrop="handleDrop(event,'${sectionId}')"
          onclick="document.getElementById('fileInput_${sectionId}').click()">
          <div class="icon">📁</div>
          <p>Drag & drop files here, or <span class="browse">browse</span></p>
          <p style="font-size:.75rem;margin-top:4px">Supports PDF, DOC, DWG, JPG, PNG, XLS, and more</p>
          <input type="file" id="fileInput_${sectionId}" multiple hidden onchange="handleFileSelect(event,'${sectionId}')">
        </div>
        <div id="fileList_${sectionId}" style="margin-top:16px">
          ${section.documents.length === 0 ? '<p style="color:var(--text-light);font-size:.85rem;text-align:center">No documents uploaded to this section yet.</p>' :
            section.documents.map((d, i) => `
              <div class="file-item">
                <div class="file-icon">${fileIcon(d.name)}</div>
                <div class="file-info">
                  <div class="file-name">${esc(d.name)}</div>
                  <div class="file-meta">${formatFileSize(d.size)} — Uploaded ${formatDate(d.uploadedAt)}</div>
                  ${d.notes ? `<div class="file-meta" style="color:var(--text);margin-top:2px">📝 ${esc(d.notes)}</div>` : ''}
                </div>
                <div class="file-actions">
                  <button title="Add notes" onclick="addDocNote('${sectionId}',${i})">📝</button>
                  <button title="Remove" onclick="removeDoc('${sectionId}',${i})">🗑️</button>
                </div>
              </div>
            `).join('')
          }
        </div>
      </div>
    </div>
  `;
}

function handleDrop(e, sectionId) {
  e.preventDefault();
  e.currentTarget.classList.remove('dragover');
  const files = e.dataTransfer.files;
  addFiles(files, sectionId);
}

function handleFileSelect(e, sectionId) {
  addFiles(e.target.files, sectionId);
}

function addFiles(files, sectionId) {
  const p = currentProject();
  if (!p) return;
  const section = p.sections.find(s => s.id === sectionId);
  if (!section) return;
  for (const f of files) {
    section.documents.push({
      name: f.name,
      size: f.size,
      type: f.type,
      uploadedAt: new Date().toISOString(),
      notes: '',
      // In a production app, you'd store the file content in IndexedDB or upload to a server
      dataUrl: null, // placeholder
    });
    // Read as data URL for preview capability
    const reader = new FileReader();
    const idx = section.documents.length - 1;
    reader.onload = () => {
      section.documents[idx].dataUrl = reader.result;
      saveState();
    };
    reader.readAsDataURL(f);
  }
  saveState();
  toast(`${files.length} file(s) added to ${section.name}`);
  openSectionTab(sectionId);
}

function removeDoc(sectionId, idx) {
  const p = currentProject();
  if (!p) return;
  const section = p.sections.find(s => s.id === sectionId);
  if (!section) return;
  if (!confirm('Remove this document?')) return;
  section.documents.splice(idx, 1);
  saveState();
  openSectionTab(sectionId);
  toast('Document removed', 'info');
}

function addDocNote(sectionId, idx) {
  const p = currentProject();
  const section = p.sections.find(s => s.id === sectionId);
  const doc = section.documents[idx];
  const note = prompt('Enter a note for this document:', doc.notes || '');
  if (note !== null) {
    doc.notes = note;
    saveState();
    openSectionTab(sectionId);
  }
}

    manufacturer: document.getElementById('eqMfr').value.trim(),
    model: document.getElementById('eqModel').value.trim(),
    serialNo: document.getElementById('eqSerial').value.trim(),
    location: document.getElementById('eqLoc').value.trim(),

function saveMaintenance() {
  const p = currentProject();
  const selEl = document.getElementById('mtEquip');
  let equip = '';
  if (selEl && selEl.value && selEl.value !== '__other') equip = selEl.value;
  else equip = document.getElementById('mtEquipOther')?.value.trim() || '';
  const data = {
    equipment: equip,
    task: document.getElementById('mtTask').value.trim(),
    frequency: document.getElementById('mtFreq').value,
    responsibility: document.getElementById('mtResp').value.trim(),
    notes: document.getElementById('mtNotes').value.trim(),
  };
  if (!data.equipment || !data.task) { toast('Equipment and Task are required', 'error'); return; }
  p.maintenanceItems.push(data);
  saveState();
  closeModal();
  renderMaintenance(document.getElementById('content'));
  toast('Maintenance task added');
}

function removeMaintenance(i) {
  if (!confirm('Remove this maintenance task?')) return;
  currentProject().maintenanceItems.splice(i, 1);
  saveState();
  renderMaintenance(document.getElementById('content'));
  toast('Task removed', 'info');
}

  <style>body{font-family:Arial,sans-serif;max-width:700px;margin:40px auto;padding:20px}h1{color:#8B1A1A;font-size:1.5rem;border-bottom:2px solid #f59e0b;padding-bottom:8px}

  <table><thead><tr><th>#</th><th>Section</th><th>Documents</th><th>Status</th></tr></thead><tbody>`;
  p.sections.forEach((s, i) => {
    const status = s.documents.length > 0 ? 'complete' : (s.required ? 'missing' : 'optional');
    const label = s.documents.length > 0 ? 'Complete' : (s.required ? 'Missing' : 'Optional');
    html += `<tr><td>${i+1}</td><td>${esc(s.name)}</td><td>${s.documents.length}</td><td><span class="status ${status}">${label}</span></td></tr>`;

  });
  html += `</tbody></table><p style="margin-top:30px;font-size:.8rem;color:#94a3b8">Generated ${new Date().toLocaleDateString('en-GB')}</p></body></html>`;
  downloadHtml(html, `ToC_${sanitizeFilename(p.name)}.html`);

      html += `<tr><td>${esc(m.equipment)}</td><td>${esc(m.task)}</td><td>${esc(m.frequency)}</td><td>${esc(m.responsibility)}</td></tr>`;
    });
    html += `</tbody></table>`;
  }

  if (p.contacts.length > 0) {
    html += `<h2>Contacts & Suppliers (${p.contacts.length})</h2>
    <table><thead><tr><th>Company</th><th>Contact</th><th>Role</th><th>Phone</th><th>Email</th></tr></thead><tbody>`;
    p.contacts.forEach(ct => {
      html += `<tr><td>${esc(ct.company)}</td><td>${esc(ct.name)}</td><td>${esc(ct.role)}</td><td>${esc(ct.phone)}</td><td>${esc(ct.email)}</td></tr>`;
    });
    html += `</tbody></table>`;
  }

  html += `<p style="margin-top:40px;font-size:.8rem;color:#94a3b8;text-align:center">O&M Manual Summary — Generated ${new Date().toLocaleDateString('en-GB')} — O&M Manager</p></body></html>`;
  downloadHtml(html, `OM_Summary_${sanitizeFilename(p.name)}.html`);
  toast('Full summary downloaded');
}

function esc(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function sanitizeFilename(str) {
  return (str || 'project').replace(/[^a-zA-Z0-9_-]/g, '_').substring(0, 40);
}

function noProjectHtml() {
  return `<div class="empty-state"><div class="icon">📁</div><h3>No project selected</h3><p>Select a project from the Projects page, or create a new one.</p><button class="btn btn-accent btn-lg" onclick="navigateTo('projects')">Go to Projects</button></div>`;
}

function downloadHtml(html, filename) {
  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportPdfManual() {
  const p = currentProject();
  if (!p) { toast('No project selected', 'error'); return; }

  // Check libraries loaded
  if (typeof window.jspdf === 'undefined' || typeof window.jspdf.jsPDF === 'undefined') {
    toast('PDF library (jsPDF) not loaded. Check internet and refresh.', 'error');
    return;
  }
  if (typeof window.PDFLib === 'undefined') {
    toast('PDF merge library (pdf-lib) not loaded. Check internet and refresh.', 'error');
    return;
  }

  const statusEl = document.getElementById('pdfStatus');
  const btnEl = document.getElementById('pdfExportBtn');
  if (statusEl) statusEl.textContent = 'Generating PDF manual...';
  if (btnEl) btnEl.disabled = true;

  // Async generation
  setTimeout(async () => {
    try {
      await _generatePdf(p, statusEl);
      if (statusEl) statusEl.textContent = 'PDF downloaded successfully.';
      toast('PDF manual downloaded');
    } catch (err) {
      console.error('PDF generation error:', err);
      if (statusEl) statusEl.textContent = 'Error: ' + err.message;
      toast('Error generating PDF: ' + err.message, 'error');
    } finally {
      if (btnEl) btnEl.disabled = false;
    }
  }, 100);
}

// ── Helper: convert dataURL to Uint8Array ──
function dataUrlToUint8(dataUrl) {
  const base64 = dataUrl.split(',')[1];
  const binary = atob(base64);
  const arr = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) arr[i] = binary.charCodeAt(i);
  return arr;
}

// ── Helper: detect file type from name ──
function isImageFile(name) {
  return /\.(jpg|jpeg|png)$/i.test(name || '');
}
function isPdfFile(name) {
  return /\.pdf$/i.test(name || '');
}

async function _generatePdf(p, statusEl) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const W = doc.internal.pageSize.getWidth();
  const H = doc.internal.pageSize.getHeight();
  const MARGIN = 20;
  const CONTENT_W = W - MARGIN * 2;
  const PRIMARY = [139, 26, 26];
  const ACCENT = [245, 158, 11];
  const GREY = [100, 116, 139];
  const DARK = [30, 41, 59];
  const WHITE = [255, 255, 255];
  const SUCCESS = [16, 185, 129];
  const DANGER = [239, 68, 68];

  const prog = getProjectProgress(p);
  const totalDocs = getTotalDocs(p);
  const generated = new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' });
  let pageNum = 0;

  // Track where each section ends (page index) for PDF insertion
  const sectionEndPages = []; // { sectionIdx, pageAfter }

  function addFooter() {
    pageNum++;
    doc.setFontSize(7.5);
    doc.setTextColor(...GREY);
    doc.text('O&M Manual - ' + p.name, MARGIN, H - 10);
    doc.text('Page ' + pageNum, W - MARGIN, H - 10, { align: 'right' });
    doc.setDrawColor(200, 210, 220);
    doc.line(MARGIN, H - 14, W - MARGIN, H - 14);
  }

  function newPage() {
    doc.addPage();
    addFooter();
  }

  function sectionHeading(title, y) {
    if (y > H - 50) { newPage(); y = MARGIN + 5; }
    doc.setFontSize(14);
    doc.setTextColor(...PRIMARY);
    doc.setFont('helvetica', 'bold');
    doc.text(title, MARGIN, y);
    y += 2;
    doc.setDrawColor(...ACCENT);
    doc.setLineWidth(0.8);
    doc.line(MARGIN, y, MARGIN + 50, y);
    doc.setLineWidth(0.2);
    return y + 8;
  }

  function kvLine(label, value, y) {
    if (y > H - 25) { newPage(); y = MARGIN + 5; }
    doc.setFontSize(9);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(...DARK);
    doc.text(label + ':', MARGIN, y);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(...GREY);
    doc.text(value || '---', MARGIN + 45, y);
    return y + 6;
  }

  // ══════════════════════════════════════════
  //  PAGE 1 — COVER PAGE
  // ══════════════════════════════════════════
  doc.setFillColor(...PRIMARY);
  doc.rect(0, 0, W, 90, 'F');
  doc.setFillColor(...ACCENT);
  doc.rect(0, 90, W, 4, 'F');

  doc.setFontSize(28);
  doc.setTextColor(...WHITE);
  doc.setFont('helvetica', 'bold');
  doc.text('Operation & Maintenance', W / 2, 40, { align: 'center' });
  doc.text('Manual', W / 2, 55, { align: 'center' });

  doc.setFontSize(13);
  doc.setFont('helvetica', 'normal');
  doc.setTextColor(200, 220, 255);
  doc.text(p.name, W / 2, 72, { align: 'center' });

  const boxY = 110;
  doc.setFillColor(248, 250, 252);
  doc.setDrawColor(220, 230, 240);
  doc.roundedRect(MARGIN, boxY, CONTENT_W, 100, 3, 3, 'FD');

  let cy = boxY + 14;
  [['Project', p.name], ['Client', p.client], ['Reference', p.reference],
   ['Site Address', p.address], ['Main Contractor', p.contractor],
   ['Project Start', formatDate(p.startDate)], ['Handover Date', formatDate(p.handoverDate)]
  ].forEach(([label, val]) => {
    doc.setFontSize(9);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(...PRIMARY);
    doc.text(label + ':', MARGIN + 8, cy);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(...DARK);
    doc.text(val || '---', MARGIN + 55, cy);
    cy += 12;
  });

  if (p.description) {
    cy = boxY + 110;
    doc.setFontSize(8.5);
    doc.setFont('helvetica', 'italic');
    doc.setTextColor(...GREY);
    const descLines = doc.splitTextToSize(p.description, CONTENT_W - 10);
    doc.text(descLines, MARGIN + 5, cy);
  }

  doc.setFontSize(8);
  doc.setTextColor(...GREY);
  doc.text('Generated: ' + generated, W / 2, H - 20, { align: 'center' });
  doc.setFillColor(...PRIMARY);
  doc.rect(0, H - 10, W, 10, 'F');
  pageNum = 0;

  // ══════════════════════════════════════════
  //  TABLE OF CONTENTS
  // ══════════════════════════════════════════
  newPage();
  let y = MARGIN + 5;
  y = sectionHeading('Table of Contents', y);

  const tocItems = [
    'Project Information',
    'Document Register',
    ...p.sections.map((s, i) => '   ' + (i + 1) + '. ' + s.name),
    'Equipment Register',
    'Maintenance Schedule',
    'Contacts & Suppliers',
    'Project Notes',
  ];

  doc.setFontSize(9.5);
  tocItems.forEach(item => {
    if (y > H - 25) { newPage(); y = MARGIN + 5; }
    const isIndented = item.startsWith('   ');
    doc.setFont('helvetica', isIndented ? 'normal' : 'bold');
    if (isIndented) { doc.setTextColor(...GREY); } else { doc.setTextColor(...DARK); }
    const x = isIndented ? MARGIN + 6 : MARGIN;
    doc.text(item.trim(), x, y);
    if (!isIndented) {
      doc.setFillColor(200, 210, 220);
      const startX = x + doc.getTextWidth(item.trim()) + 4;
      const endX = W - MARGIN - 10;
      for (let dx = startX; dx < endX; dx += 2.5) {
        doc.circle(dx, y - 1, 0.3, 'F');
      }
    }
    y += isIndented ? 5.5 : 7;
  });

  // ══════════════════════════════════════════
  //  PROJECT INFORMATION
  // ══════════════════════════════════════════
  newPage();
  y = MARGIN + 5;
  y = sectionHeading('Project Information', y);

  y = kvLine('Project Name', p.name, y);
  y = kvLine('Client', p.client, y);
  y = kvLine('Reference', p.reference, y);
  y = kvLine('Site Address', p.address, y);
  y = kvLine('Main Contractor', p.contractor, y);
  y = kvLine('Start Date', formatDate(p.startDate), y);
  y = kvLine('Handover Date', formatDate(p.handoverDate), y);

  if (p.description) {
    y += 4;
    y = kvLine('Description', '', y);
    doc.setFontSize(8.5);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(...DARK);
    const dLines = doc.splitTextToSize(p.description, CONTENT_W - 10);
    if (y + dLines.length * 4 > H - 25) { newPage(); y = MARGIN + 5; }
    doc.text(dLines, MARGIN + 5, y);
    y += dLines.length * 4 + 6;
  }

  y += 6;
  y = sectionHeading('Completion Summary', y);

  doc.setFontSize(9);
  doc.setFont('helvetica', 'normal');
  doc.setTextColor(...DARK);
  doc.text('Overall Completion: ' + prog + '%', MARGIN, y);
  y += 4;
  doc.setFillColor(226, 232, 240);
  doc.roundedRect(MARGIN, y, CONTENT_W, 5, 2, 2, 'F');
  const barColor = prog >= 75 ? SUCCESS : (prog >= 40 ? ACCENT : DANGER);
  doc.setFillColor(...barColor);
  if (prog > 0) doc.roundedRect(MARGIN, y, Math.max(4, CONTENT_W * (prog / 100)), 5, 2, 2, 'F');
  y += 10;

  doc.text('Total Documents: ' + totalDocs, MARGIN, y); y += 5;
  doc.text('Equipment Items: ' + p.equipment.length, MARGIN, y); y += 5;
  doc.text('Maintenance Tasks: ' + p.maintenanceItems.length, MARGIN, y); y += 5;
  doc.text('Contacts/Suppliers: ' + p.contacts.length, MARGIN, y);

  // ══════════════════════════════════════════
  //  DOCUMENT REGISTER — OVERVIEW TABLE
  // ══════════════════════════════════════════
  newPage();
  y = MARGIN + 5;
  y = sectionHeading('Document Register', y);

  doc.autoTable({
    startY: y,
    head: [['#', 'Section', 'Required', 'Documents', 'Status']],
    body: p.sections.map((s, i) => [
      i + 1, s.name, s.required ? 'Yes' : 'No', s.documents.length,
      s.documents.length > 0 ? 'Complete' : (s.required ? 'MISSING' : 'Optional'),
    ]),
    theme: 'grid',
    headStyles: { fillColor: PRIMARY, fontSize: 8, fontStyle: 'bold', halign: 'left' },
    bodyStyles: { fontSize: 8, textColor: DARK },
    alternateRowStyles: { fillColor: [248, 250, 252] },
    columnStyles: {
      0: { cellWidth: 10, halign: 'center' },
      2: { cellWidth: 20, halign: 'center' },
      3: { cellWidth: 22, halign: 'center' },
      4: { cellWidth: 24, halign: 'center' },
    },
    margin: { left: MARGIN, right: MARGIN },
    didParseCell: (data) => {
      if (data.column.index === 4 && data.section === 'body') {
        const val = data.cell.raw;
        if (val === 'Complete') data.cell.styles.textColor = [6, 95, 70];
        else if (val === 'MISSING') { data.cell.styles.textColor = [153, 27, 27]; data.cell.styles.fontStyle = 'bold'; }
        else data.cell.styles.textColor = [146, 64, 14];
      }
    },
  });

  // ══════════════════════════════════════════
  //  EACH SECTION — LISTING + EMBEDDED IMAGES
  // ══════════════════════════════════════════
  p.sections.forEach((section, sIdx) => {
    newPage();
    y = MARGIN + 5;

    // Section number badge
    doc.setFillColor(...PRIMARY);
    doc.roundedRect(MARGIN, y - 5, 8, 8, 1, 1, 'F');
    doc.setFontSize(8);
    doc.setTextColor(...WHITE);
    doc.setFont('helvetica', 'bold');
    doc.text(String(sIdx + 1), MARGIN + 4, y, { align: 'center' });

    doc.setFontSize(13);
    doc.setTextColor(...PRIMARY);
    doc.text(section.name, MARGIN + 12, y + 1);
    y += 4;
    doc.setDrawColor(...ACCENT);
    doc.setLineWidth(0.6);
    doc.line(MARGIN, y, W - MARGIN, y);
    doc.setLineWidth(0.2);
    y += 5;

    doc.setFontSize(7.5);
    if (section.required) {
      doc.setFillColor(254, 226, 226);
      doc.setTextColor(153, 27, 27);
      doc.roundedRect(MARGIN, y - 3, 22, 5, 1, 1, 'F');
      doc.text('REQUIRED', MARGIN + 2, y);
    } else {
      doc.setFillColor(219, 234, 254);
      doc.setTextColor(30, 64, 175);
      doc.roundedRect(MARGIN, y - 3, 20, 5, 1, 1, 'F');
      doc.text('OPTIONAL', MARGIN + 2, y);
    }
    y += 6;

    doc.setFontSize(8.5);
    doc.setFont('helvetica', 'italic');
    doc.setTextColor(...GREY);
    doc.text(section.description, MARGIN, y);
    y += 8;

    if (section.documents.length === 0) {
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      doc.setTextColor(...GREY);
      doc.text('No documents uploaded to this section.', MARGIN, y);
    } else {
      doc.autoTable({
        startY: y,
        head: [['#', 'Document Name', 'File Size', 'Date Uploaded', 'Notes']],
        body: section.documents.map((d, di) => [
          di + 1, d.name, formatFileSize(d.size), formatDate(d.uploadedAt), d.notes || '---',
        ]),
        theme: 'striped',
        headStyles: { fillColor: PRIMARY, fontSize: 7.5, fontStyle: 'bold' },
        bodyStyles: { fontSize: 7.5, textColor: DARK },
        alternateRowStyles: { fillColor: [248, 250, 252] },
        columnStyles: { 0: { cellWidth: 8, halign: 'center' }, 2: { cellWidth: 22 }, 3: { cellWidth: 28 } },
        margin: { left: MARGIN, right: MARGIN },
      });

      // ── Embed uploaded IMAGES directly after the listing ──
      section.documents.forEach(d => {
        if (isImageFile(d.name) && d.dataUrl) {
          try {
            newPage();
            // Title bar
            doc.setFillColor(248, 250, 252);
            doc.rect(MARGIN, MARGIN, CONTENT_W, 10, 'F');
            doc.setFontSize(8);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(...PRIMARY);
            doc.text(section.name + ' — ' + d.name, MARGIN + 3, MARGIN + 7);

            // Determine image format
            const fmt = /\.png$/i.test(d.name) ? 'PNG' : 'JPEG';
            const imgY = MARGIN + 14;
            const maxW = CONTENT_W;
            const maxH = H - imgY - 20; // leave room for footer

            // addImage auto-scales within the given box
            doc.addImage(d.dataUrl, fmt, MARGIN, imgY, maxW, maxH);
          } catch (imgErr) {
            console.warn('Could not embed image ' + d.name + ':', imgErr);
            // Still continue — just skip this image
            doc.setFontSize(8);
            doc.setTextColor(...GREY);
            doc.text('(Image could not be embedded: ' + d.name + ')', MARGIN, MARGIN + 20);
          }
        }
      });
    }

    // Record the page number after this section (for PDF insertion later)
    sectionEndPages.push({
      sectionIdx: sIdx,
      sectionName: section.name,
      pageAfter: doc.internal.getNumberOfPages(),
      pdfDocs: section.documents.filter(d => isPdfFile(d.name) && d.dataUrl)
    });
  });

  // ══════════════════════════════════════════
  //  EQUIPMENT REGISTER
  // ══════════════════════════════════════════
  newPage();
  y = MARGIN + 5;
  y = sectionHeading('Equipment Register', y);

  if (p.equipment.length === 0) {
    doc.setFontSize(9);
    doc.setTextColor(...GREY);
    doc.text('No equipment items registered for this project.', MARGIN, y);
  } else {
    doc.autoTable({
      startY: y,
      head: [['Tag / Ref', 'Description', 'System', 'Manufacturer', 'Model', 'Serial No.', 'Location']],
      body: p.equipment.map(eq => [eq.tag, eq.description, eq.system, eq.manufacturer, eq.model, eq.serialNo, eq.location]),
      theme: 'grid',
      headStyles: { fillColor: PRIMARY, fontSize: 7.5, fontStyle: 'bold' },
      bodyStyles: { fontSize: 7.5, textColor: DARK },
      alternateRowStyles: { fillColor: [248, 250, 252] },
      margin: { left: MARGIN, right: MARGIN },
      columnStyles: { 0: { fontStyle: 'bold' } },
    });

    const eqWithNotes = p.equipment.filter(e => e.notes);
    if (eqWithNotes.length > 0) {
      y = (doc.lastAutoTable ? doc.lastAutoTable.finalY : y) + 10;
      if (y > H - 40) { newPage(); y = MARGIN + 5; }
      doc.setFontSize(10);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(...PRIMARY);
      doc.text('Equipment Notes', MARGIN, y);
      y += 6;
      eqWithNotes.forEach(eq => {
        if (y > H - 25) { newPage(); y = MARGIN + 5; }
        doc.setFontSize(8);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(...DARK);
        doc.text(eq.tag + ':', MARGIN, y);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(...GREY);
        const noteLines = doc.splitTextToSize(eq.notes, CONTENT_W - 40);
        doc.text(noteLines, MARGIN + 35, y);
        y += noteLines.length * 4 + 4;
      });
    }
  }

  // ══════════════════════════════════════════
  //  MAINTENANCE SCHEDULE
  // ══════════════════════════════════════════
  newPage();
  y = MARGIN + 5;
  y = sectionHeading('Planned Preventive Maintenance Schedule', y);

  if (p.maintenanceItems.length === 0) {
    doc.setFontSize(9);
    doc.setTextColor(...GREY);
    doc.text('No maintenance tasks defined for this project.', MARGIN, y);
  } else {
    doc.autoTable({
      startY: y,
      head: [['Equipment', 'Task Description', 'Frequency', 'Responsibility', 'Notes']],
      body: p.maintenanceItems.map(m => [m.equipment, m.task, m.frequency, m.responsibility, m.notes || '---']),
      theme: 'grid',
      headStyles: { fillColor: PRIMARY, fontSize: 7.5, fontStyle: 'bold' },
      bodyStyles: { fontSize: 7.5, textColor: DARK },
      alternateRowStyles: { fillColor: [248, 250, 252] },
      margin: { left: MARGIN, right: MARGIN },
      columnStyles: { 0: { fontStyle: 'bold', cellWidth: 35 }, 2: { cellWidth: 22, halign: 'center' }, 3: { cellWidth: 30 } },
    });
  }

  // ══════════════════════════════════════════
  //  CONTACTS & SUPPLIERS
  // ══════════════════════════════════════════
  newPage();
  y = MARGIN + 5;
  y = sectionHeading('Contacts & Suppliers', y);

  if (p.contacts.length === 0) {
    doc.setFontSize(9);
    doc.setTextColor(...GREY);
    doc.text('No contacts or suppliers recorded for this project.', MARGIN, y);
  } else {
    doc.autoTable({
      startY: y,
      head: [['Company', 'Contact Name', 'Role / Trade', 'Phone', 'Email', 'Notes']],
      body: p.contacts.map(ct => [ct.company, ct.name, ct.role, ct.phone, ct.email, ct.notes || '---']),
      theme: 'grid',
      headStyles: { fillColor: PRIMARY, fontSize: 7.5, fontStyle: 'bold' },
      bodyStyles: { fontSize: 7.5, textColor: DARK },
      alternateRowStyles: { fillColor: [248, 250, 252] },
      margin: { left: MARGIN, right: MARGIN },
      columnStyles: { 0: { fontStyle: 'bold' } },
    });
  }

  // ══════════════════════════════════════════
  //  PROJECT NOTES
  // ══════════════════════════════════════════
  if (p.notes.length > 0) {
    newPage();
    y = MARGIN + 5;
    y = sectionHeading('Project Notes', y);

    p.notes.slice().reverse().forEach(n => {
      if (y > H - 30) { newPage(); y = MARGIN + 5; }
      doc.setFontSize(7.5);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(...GREY);
      doc.text(formatDate(n.date), MARGIN, y);
      y += 4;
      doc.setFontSize(8.5);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(...DARK);
      const nLines = doc.splitTextToSize(n.text, CONTENT_W - 5);
      doc.text(nLines, MARGIN + 2, y);
      y += nLines.length * 4 + 3;
      doc.setDrawColor(226, 232, 240);
      doc.line(MARGIN, y, W - MARGIN, y);
      y += 5;
    });
  }

  // ══════════════════════════════════════════
  //  END PAGE
  // ══════════════════════════════════════════
  newPage();
  y = H / 2 - 20;
  doc.setFillColor(...PRIMARY);
  doc.roundedRect(MARGIN + 20, y - 10, CONTENT_W - 40, 50, 3, 3, 'F');
  doc.setFontSize(16);
  doc.setTextColor(...WHITE);
  doc.setFont('helvetica', 'bold');
  doc.text('End of O&M Manual', W / 2, y + 8, { align: 'center' });
  doc.setFontSize(9);
  doc.setFont('helvetica', 'normal');
  doc.text(p.name, W / 2, y + 18, { align: 'center' });
  doc.text('Generated: ' + generated, W / 2, y + 26, { align: 'center' });
  doc.setFontSize(8);
  doc.setTextColor(...GREY);
  doc.text('This document was produced using O&M Manager.', W / 2, y + 50, { align: 'center' });

  // ══════════════════════════════════════════
  //  PHASE 2 — MERGE UPLOADED PDFs with pdf-lib
  // ══════════════════════════════════════════
  const hasPdfUploads = sectionEndPages.some(s => s.pdfDocs.length > 0);

  if (!hasPdfUploads) {
    // No PDFs to merge — just save directly
    doc.save('OM_Manual_' + sanitizeFilename(p.name) + '.pdf');
    return;
  }

  if (statusEl) statusEl.textContent = 'Merging uploaded documents...';

  // Get jsPDF output as ArrayBuffer
  const jspdfBytes = doc.output('arraybuffer');

  const { PDFDocument, rgb } = window.PDFLib;
  const finalPdf = await PDFDocument.load(jspdfBytes);

  // Process sections in REVERSE order so page insertions don't shift earlier indices
  for (let i = sectionEndPages.length - 1; i >= 0; i--) {
    const sec = sectionEndPages[i];
    if (sec.pdfDocs.length === 0) continue;

    let insertAt = sec.pageAfter; // insert after this page index (0-based in pdf-lib)

    // Process each uploaded PDF in this section
    for (const pdfDoc of sec.pdfDocs) {
      try {
        const bytes = dataUrlToUint8(pdfDoc.dataUrl);
        const uploadedPdf = await PDFDocument.load(bytes, { ignoreEncryption: true });
        const pageIndices = uploadedPdf.getPageIndices();
        const copiedPages = await finalPdf.copyPages(uploadedPdf, pageIndices);

        // Insert a separator page before the uploaded PDF pages
        const sepPage = finalPdf.insertPage(insertAt, [595.28, 841.89]); // A4
        sepPage.drawRectangle({ x: 0, y: 841.89 - 60, width: 595.28, height: 60, color: rgb(30/255, 58/255, 95/255) });
        sepPage.drawText('Attached Document', { x: 50, y: 841.89 - 38, size: 18, color: rgb(1, 1, 1) });
        sepPage.drawText(sec.sectionName + ' — ' + pdfDoc.name, { x: 50, y: 841.89 - 55, size: 10, color: rgb(0.8, 0.86, 1) });
        sepPage.drawText('File: ' + pdfDoc.name + '   |   Size: ' + formatFileSize(pdfDoc.size) + '   |   Uploaded: ' + formatDate(pdfDoc.uploadedAt), {
          x: 50, y: 80, size: 8, color: rgb(0.4, 0.46, 0.55)
        });
        insertAt++;

        // Insert all pages from the uploaded PDF
        copiedPages.forEach(pg => {
          finalPdf.insertPage(insertAt, pg);
          insertAt++;
        });
      } catch (pdfErr) {
        console.warn('Could not merge PDF ' + pdfDoc.name + ':', pdfErr);
        // Insert an error note page instead
        const errPage = finalPdf.insertPage(insertAt, [595.28, 841.89]);
        errPage.drawText('Could not embed: ' + pdfDoc.name, { x: 50, y: 750, size: 12, color: rgb(0.9, 0.2, 0.2) });
        errPage.drawText('The file may be encrypted or corrupted.', { x: 50, y: 730, size: 9, color: rgb(0.4, 0.46, 0.55) });
        insertAt++;
      }
    }
  }

  // Save the final merged PDF
  const finalBytes = await finalPdf.save();
  const blob = new Blob([finalBytes], { type: 'application/pdf' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'OM_Manual_' + sanitizeFilename(p.name) + '.pdf';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── Init ──
// If embedded in portal iframe, hide the sidebar and adjust layout
if(new URLSearchParams(window.location.search).get('embedded')==='1'){
  document.getElementById('sidebar').style.display='none';
  document.querySelector('.main').style.marginLeft='0';
  document.body.style.background='#f1f5f9';
}
renderPage('dashboard');
</script>
